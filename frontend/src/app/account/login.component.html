<div class="auth-header">
    <h2 class="auth-title"><i class="bi bi-shield-lock-fill text-primary"></i> EMS Portal</h2>
    <p class="auth-subtitle">Sign in to manage employees & requests</p>
</div>
<div class="auth-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" placeholder="name@company.com" />
            <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" placeholder="••••••••" />
            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                <div *ngIf="f['password'].errors['required']">Password is required</div>
            </div>
        </div>
        <div class="row align-items-center mt-4">
            <div class="col">
                <button [disabled]="submitting" class="btn btn-primary w-100 mb-2">
                    <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
                    Sign In
                </button>
            </div>
        </div>
        <div class="d-flex justify-content-between mt-3" style="font-size: 0.85rem;">
            <a routerLink="../register">Create Account</a>
            <a routerLink="../forgot-password">Forgot Password?</a>
        </div>
    </form>
</div>
