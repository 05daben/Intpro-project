<h2 class="page-title mb-4">Update Profile</h2>

<div class="card col-md-8">
    <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="mb-3 col-3">
                    <label class="form-label">Title</label>
                    <select formControlName="title" class="form-select" [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
                        <option value=""></option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Miss">Miss</option>
                        <option value="Ms">Ms</option>
                    </select>
                    <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
                        <div *ngIf="f['title'].errors['required']">Required</div>
                    </div>
                </div>
                <div class="mb-3 col-4">
                    <label class="form-label">First Name</label>
                    <input type="text" formControlName="firstName" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }" />
                    <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
                        <div *ngIf="f['firstName'].errors['required']">Required</div>
                    </div>
                </div>
                <div class="mb-3 col-5">
                    <label class="form-label">Last Name</label>
                    <input type="text" formControlName="lastName" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }" />
                    <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
                        <div *ngIf="f['lastName'].errors['required']">Required</div>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
                <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">Email is required</div>
                    <div *ngIf="f['email'].errors['email']">Must be a valid email</div>
                </div>
            </div>
            
            <h4 class="text-white fw-bold pt-3 border-top border-light mb-3" style="--bs-border-opacity: 0.05;">Change Password</h4>
            <p class="text-secondary small mb-3">Leave blank to keep the same password</p>
            <div class="row">
                <div class="mb-3 col">
                    <label class="form-label">New Password</label>
                    <input type="password" formControlName="password" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" placeholder="••••••••" />
                    <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                        <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
                    </div>
                </div>
                <div class="mb-3 col">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" formControlName="confirmPassword" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }" placeholder="••••••••" />
                    <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                        <div *ngIf="f['confirmPassword'].errors['mustMatch']">Must match</div>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button [disabled]="submitting" class="btn btn-primary me-2">
                    <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
                    Update Settings
                </button>
                <button type="button" (click)="onDelete()" [disabled]="deleting" class="btn btn-danger me-2">
                    <span *ngIf="deleting" class="spinner-border spinner-border-sm me-1"></span>
                    Delete Account
                </button>
                <a routerLink="../" class="btn btn-link">Cancel</a>
            </div>
        </form>
    </div>
</div>
