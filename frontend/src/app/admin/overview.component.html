<div class="page-header mb-4">
    <h2 class="page-title">Admin Console</h2>
    <p class="page-subtitle">Manage organizational accounts, employees, and departments</p>
</div>

<div class="stats-grid">
    <a routerLink="/admin/accounts" class="stat-box" style="text-decoration: none; cursor: pointer;">
        <div>
            <div class="stat-title">Accounts</div>
            <div class="stat-value" style="font-size: 1.25rem;">Manage Users</div>
        </div>
        <div class="stat-icon-wrapper stat-icon-primary">
            <i class="bi bi-people-fill"></i>
        </div>
    </a>

    <a routerLink="/admin/employees" class="stat-box" style="text-decoration: none; cursor: pointer;">
        <div>
            <div class="stat-title">Employees</div>
            <div class="stat-value" style="font-size: 1.25rem;">Staff Directory</div>
        </div>
        <div class="stat-icon-wrapper stat-icon-success">
            <i class="bi bi-person-badge-fill"></i>
        </div>
    </a>

    <a routerLink="/admin/departments" class="stat-box" style="text-decoration: none; cursor: pointer;">
        <div>
            <div class="stat-title">Departments</div>
            <div class="stat-value" style="font-size: 1.25rem;">Divisions</div>
        </div>
        <div class="stat-icon-wrapper stat-icon-warning">
            <i class="bi bi-building"></i>
        </div>
