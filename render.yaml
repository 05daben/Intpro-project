services:
  # Backend Web Service (Node.js API Server)
  - type: web
    name: intpro-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend Static Site (Angular App)
  - type: web
    name: intpro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/angular-21-auth-boilerplate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
